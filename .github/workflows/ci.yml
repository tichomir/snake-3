name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML (htmlhint)
        run: npx htmlhint index.html

  # ── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required files exist
        run: |
          test -f index.html && echo "✓ index.html"
          test -f style.css  && echo "✓ style.css"
          test -f main.js    && echo "✓ main.js"

      - name: Check JavaScript syntax
        run: node --check main.js

      - name: Smoke test (serve + curl)
        run: |
          npx serve . --listen 8080 &
          SERVER_PID=$!
          sleep 3
          curl --fail --silent http://localhost:8080/ | grep -q "Hello, World!" \
            && echo "✓ Smoke test passed: 'Hello, World!' found in response" \
            || (echo "✗ Smoke test failed" && kill $SERVER_PID && exit 1)
          kill $SERVER_PID

  # ── Stage 3: Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
