<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake 3</title>
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas
      id="game-canvas"
      width="400"
      height="400"
      role="application"
      aria-label="Snake 3 game area"
      aria-describedby="game-keyboard-instructions"
      tabindex="0"
    ></canvas>
    <p id="game-keyboard-instructions" class="sr-only">
      Keyboard controls: Arrow keys or WASD to change direction.
      P to pause or resume the game.
      Enter or Space to start the game or restart after game over.
      The snake moves continuously; avoid hitting walls or yourself.
    </p>

    <!-- Semantic buttons for screen reader users (Bug A-02) -->
    <button id="btn-start"      class="sr-only" type="button">Start Game</button>
    <button id="btn-resume"     class="sr-only" type="button" hidden>Resume</button>
    <button id="btn-play-again" class="sr-only" type="button" hidden>Play Again</button>

    <!-- Live region for game-state announcements (Bug A-03) -->
    <div id="game-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
